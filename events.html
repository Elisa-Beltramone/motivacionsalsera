<!DOCTYPE html>

    <link rel="stylesheet" href="style.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<body>

    <!-- HEADER / NAVBAR -->
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">
                <img src="assets/logo.png" alt="Motivación Salsera Logo">
            </a>

            <ul class="nav-links" id="navLinks">

                <li><a href="contact.html" data-de="Kontakt" data-es="Contacto">Kontakt</a></li>
                <li class="mobile-lang">
                    <select id="languageSwitcherMobile">
                        <option value="de">DE</option>
                        <option value="es">ES</option>

                </li>
            </ul>

            <div class="nav-right">
                <!-- Desktop Language Switcher -->
                <select id="languageSwitcherDesktop" class="desktop-lang">

        <div class="flyer-container">

        <a href="https://wa.me/41790000000" target="_blank" class="btn glow-btn" data-de="Jetzt Anmelden"
            data-es="Inscribirse Ahora">

        <!-- Flyer Modal -->
        <div id="flyerModal" class="flyer-modal">
            <span id="closeModal" class="close-modal" aria-label="Close modal">&times;</span>
            <img id="modalImage" class="modal-content" alt="Full Flyer">
        </div>

    <footer>
        <p>© <span id="year"></span> Motivación Salsera – Bern</p>
    </footer>

    <a href="https://wa.me/41790000000" class="floating-whatsapp" target="_blank">
